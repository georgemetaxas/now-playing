<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Now Playing</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎵</text></svg>" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- Ambient blurred backdrop (fills full screen behind everything) -->
  <div id="backdrop"></div>
  <div id="vignette"></div>

  <!-- feed status: faint when live, red when polling has stalled -->
  <div id="live-dot" title="Last.fm feed status"></div>

  <!-- NOW PLAYING (full-bleed art) -->
  <main id="player">
    <img id="art" alt="" />
    <div id="shade"></div>
    <div id="meta">
      <div id="title-wrap"><h1 id="title"></h1></div>
      <p id="subtitle"></p>
    </div>
  </main>

  <!-- SCREENSAVER (nothing playing) -->
  <section id="screensaver">
    <div id="mosaic"></div>
    <div id="ss-dim"></div>
    <div id="ss-center">
      <div id="clock">--:--</div>
      <div id="date"></div>
      <div id="idle">Nothing playing</div>
    </div>
  </section>

  <!-- Controls -->
  <div id="controls">
    <div id="layout-toggle">
      <button data-layout="fullbleed" title="Full bleed" aria-label="Full bleed">
        <svg viewBox="0 0 20 20"><rect x="2" y="3.5" width="16" height="13" rx="2" fill="currentColor"/></svg>
      </button>
      <button data-layout="albumart" title="Album art" aria-label="Album art">
        <svg viewBox="0 0 20 20"><rect x="2" y="3.5" width="16" height="13" rx="2" fill="none" stroke="currentColor" stroke-width="1.6"/><rect x="6" y="6.5" width="8" height="7" rx="1" fill="currentColor"/></svg>
      </button>
    </div>
    <button id="settings-btn" title="Settings">⚙</button>
    <button id="fs-btn" title="Fullscreen">⛶</button>
  </div>

  <!-- Settings panel -->
  <div id="settings" class="hidden">
    <div class="panel">
      <h2>Setup</h2>
      <label>Last.fm username
        <input id="cfg-user" type="text" placeholder="your-lastfm-username" autocomplete="off" />
      </label>
      <label>Last.fm API key
        <input id="cfg-key" type="text" placeholder="32-char API key" autocomplete="off" />
        <small>Get one free at <a href="https://www.last.fm/api/account/create" target="_blank" rel="noopener">last.fm/api/account/create</a></small>
      </label>
      <div class="row">
        <button id="cfg-save" class="primary">Save</button>
        <button id="cfg-close">Close</button>
      </div>
      <p class="hint">Play music on YouTube Music with the free <a href="https://chromewebstore.google.com/detail/web-scrobbler/hhinaapppaileiechjoiifaancjggfjm" target="_blank" rel="noopener">Web Scrobbler</a> extension installed — it reports tracks to Last.fm and this screen reflects them live.</p>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
